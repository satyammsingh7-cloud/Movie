apiVersion: v1
kind: ConfigMap
metadata:
  name: movie-site
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>CineVerse - Movie Recommendations</title>

      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          background: #0f172a;
          color: white;
          font-family: Arial, sans-serif;
        }

        header {
          background: #020617;
          text-align: center;
          padding: 20px;
          border-bottom: 3px solid #ef4444;
        }

        header h1 {
          color: #ef4444;
          font-size: 3rem;
        }

        header p {
          color: #cbd5e1;
          margin-top: 10px;
        }

        .hero {
          text-align: center;
          padding: 40px 20px;
        }

        .hero h2 {
          font-size: 2rem;
          margin-bottom: 10px;
        }

        .hero p {
          color: #94a3b8;
        }

        .grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
          gap: 20px;
          padding: 30px;
        }

        .card {
          background: #1e293b;
          border-radius: 12px;
          overflow: hidden;
          transition: transform 0.3s ease;
        }

        .card:hover {
          transform: translateY(-8px);
        }

        .card img {
          width: 100%;
          height: 320px;
          object-fit: cover;
        }

        .card-content {
          padding: 15px;
        }

        .card-content h3 {
          font-size: 1rem;
          margin-bottom: 8px;
        }

        .rating {
          color: #fbbf24;
        }

        footer {
          text-align: center;
          padding: 20px;
          background: #020617;
          margin-top: 20px;
          color: #94a3b8;
        }
      </style>
    </head>

    <body>

      <header>
        <h1>🎬 CineVerSe</h1>
        <p>Top Movie Recommendations Powered by SATYAM</p>
      </header>

      <section class="hero">
        <h2>Discover Great Movies</h2>
        <p>Browse some of the highest-rated films ever made.</p>
      </section>

      <div class="grid" id="movies"></div>

      <footer>
        Running on Kubernetes 🚀
      </footer>

      <script>
        const movies = [
          {
            title:"The Shawshank Redemption",
            rating:"9.3",
            poster:"https://image.tmdb.org/t/p/w500/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg"
          },
          {
            title:"The Godfather",
            rating:"9.2",
            poster:"https://image.tmdb.org/t/p/w500/3bhkrj58Vtu7enYsRolD1fZdja1.jpg"
          },
          {
            title:"The Dark Knight",
            rating:"9.0",
            poster:"https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg"
          },
          {
            title:"Pulp Fiction",
            rating:"8.9",
            poster:"https://image.tmdb.org/t/p/w500/d5iIlFn5s0ImszYzBPb8JPIfbXD.jpg"
          },
          {
            title:"Fight Club",
            rating:"8.8",
            poster:"https://image.tmdb.org/t/p/w500/pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg"
          },
          {
            title:"Forrest Gump",
            rating:"8.8",
            poster:"https://image.tmdb.org/t/p/w500/arw2vcBveWOVZr6pxd9XTd1TdQa.jpg"
          },
          {
            title:"Inception",
            rating:"8.8",
            poster:"https://image.tmdb.org/t/p/w500/8IB2e4r4oVhHnANbnm7O3Tj6tF8.jpg"
          },
          {
            title:"Interstellar",
            rating:"8.7",
            poster:"https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg"
          },
          {
            title:"The Matrix",
            rating:"8.7",
            poster:"https://image.tmdb.org/t/p/w500/f89U3ADr1oiB1s9GkdPOEpXUk5H.jpg"
          },
          {
            title:"Gladiator",
            rating:"8.5",
            poster:"https://image.tmdb.org/t/p/w500/ty8TGRuvJLPUmAR1H1nRIsgwvim.jpg"
          },
          {
            title:"Parasite",
            rating:"8.5",
            poster:"https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg"
          },
          {
            title:"Whiplash",
            rating:"8.5",
            poster:"https://image.tmdb.org/t/p/w500/7fn624j5lj3xTme2SgiLCeuedmO.jpg"
          },
          {
            title:"Oppenheimer",
            rating:"8.4",
            poster:"https://image.tmdb.org/t/p/w500/ptpr0kGAckfQkJeJIt8st5dglvd.jpg"
          },
          {
            title:"Dune",
            rating:"8.2",
            poster:"https://image.tmdb.org/t/p/w500/d5NXSklXo0qyIYkgV94XAgMIckC.jpg"
          },
          {
            title:"Avengers: Endgame",
            rating:"8.4",
            poster:"https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg"
          }
        ];

        const grid = document.getElementById("movies");

        for (let i = 0; i < 50; i++) {
          const movie = movies[i % movies.length];

          grid.innerHTML += `
            <div class="card">
              <img src="${movie.poster}" alt="${movie.title}">
              <div class="card-content">
                <h3>#${i + 1} ${movie.title}</h3>
                <div class="rating">⭐ ${movie.rating}/10</div>
              </div>
            </div>
          `;
        }
      </script>

    </body>
    </html>
